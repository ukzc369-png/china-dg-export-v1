name: Submit sitemap to IndexNow

on:
  push:
    branches: [main]
    paths:
      - "public/sitemap.xml"
      - "src/**"
      - "api/**"
      - "functions/**"
      - "scripts/submit-indexnow.mjs"
      - "public/8c31e76f4a8b42d9a56f3e217cb940ad.txt"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/submit-indexnow.mjs
